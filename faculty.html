<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIFT Faculty Session · Info Edge × NIFT</title>
  <meta name="description" content="Internal facilitator cheat-sheet for the 25-minute hands-on exercise at the NIFT × Info Edge workshop." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["'Inter Tight'", "ui-sans-serif", "system-ui"],
            serif: ["'Fraunces'", "Georgia", "serif"],
            mono: ["'JetBrains Mono'", "ui-monospace", "monospace"]
          }
        }
      }
    };
  </script>

  <style>
    html, body, #root { height: 100%; }
    body {
      margin: 0;
      background: #F7F4EC;
      color: #0B0B0B;
      font-family: 'Inter Tight', -apple-system, system-ui, sans-serif;
      overflow: hidden;
    }
    .deck-root {
      --paper: #F7F4EC;
      --paper-2: #EFEAD9;
      --ink: #0B0B0B;
      --ink-soft: #2A2622;
      --muted: #6B6158;
      --line: #D9D2C0;
      --line-strong: #B5AC97;
      --accent: #B0341E;
      --accent-soft: #F2DAD2;
    }
    .display-serif {
      font-family: 'Fraunces', Georgia, serif;
      font-variation-settings: "SOFT" 30, "opsz" 144;
    }
    button { background: transparent; border: none; padding: 0; font: inherit; color: inherit; cursor: pointer; }
    .slide-fade { animation: slide-in 280ms cubic-bezier(0.2, 0.6, 0.2, 1); }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* Verbatim script block */
    .script {
      background: #FFF;
      border-left: 4px solid var(--accent);
      padding: 18px 22px;
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 20px;
      line-height: 1.5;
      color: var(--ink);
    }
    .script.lg { font-size: 22px; }
    /* Comparison table */
    table.compare {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }
    table.compare th, table.compare td {
      text-align: left;
      vertical-align: top;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }
    table.compare th {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      border-bottom: 2px solid var(--ink);
    }
    table.compare th:first-child, table.compare td:first-child {
      font-weight: 600;
    }
    table.compare tr.recommend td { background: var(--accent-soft); }
    .boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #F7F4EC; color: #6B6158;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.2em;
      text-transform: uppercase; z-index: 100;
      transition: opacity 300ms ease;
    }
    .boot.hidden { opacity: 0; pointer-events: none; }
    /* Scrollable content area for dense slides */
    .scroll-y { overflow-y: auto; max-height: 100%; }
    .scroll-y::-webkit-scrollbar { width: 6px; }
    .scroll-y::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="boot" class="boot">Loading facilitator deck…</div>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="typescript,react">
    /**
     * FacilitatorDeck — internal cheat-sheet for the NIFT × Info Edge workshop.
     * Keyboard: → / Space / click  advance · ←  back · F  toggle margin notes · 1–9  jump
     */
    const { useCallback, useEffect, useState } = React;

    // ─── Content ─────────────────────────────────────────────────────────────
    const IB = "Icebreaker · Broken Telephone, Drawn";
    const E1 = "Exercise 1 · Mess Queue";
    const E2 = "Exercise 2 · Open Day";

    const SLIDES = [
      {
        id: 1,
        kind: "cover",
        eyebrow: "From the Info Edge design team",
        team: [
          { name: "Abhishek Verma",  title: "Vice President",            department: "UI / UX Design",  photo: "Abhishek.png" },
          { name: "Divyansh Nigam",  title: "Associate Vice President",  department: "UI / UX Design",  photo: "Divyansh.png" },
          { name: "Kamini",          title: "Talent Acquisition Manager", department: "Human Resources", photo: "Kamini.png"  }
        ],
        note: "60 seconds. Names, roles, why you're here. Then advance to the quick check — don't explain it, just ask the four questions verbally."
      },
      {
        id: 2,
        kind: "quick-check",
        eyebrow: "Quick check",
        question: "How many of you are leveraging {HIGHLIGHT}\nin your workflow?",
        highlight: "AI",
        note: "Hands up. Count slowly. Whatever the number, that's the launchpad — high count means we go deeper, low count means the next slides are gold for them. Don't editorialise; just acknowledge and move on."
      },
      {
        id: 3,
        kind: "hook",
        eyebrow: "Section 01 · Buy yourself time",
        title: "Let's get your\n{HIGHLIGHT} hours back\nthis week.",
        highlight: "5",
        subtitle: "Before we talk about teaching with AI — let's get you AI for you.",
        note: "Land this as a promise, not a claim. The next slide is the demo. Pace: 30 seconds on this slide."
      },
      {
        id: 4,
        kind: "breaker",
        eyebrow: "Live demos",
        title: "Let's see some\n{HIGHLIGHT}.",
        highlight: "real use cases",
        instruction: "How we're leveraging AI to buy back some more exploration time.",
        note: "Switch to your laptop / browser tab here. Three short demos: lesson plan outline, attendance/Excel cleanup, quick PPT. ~2 min each. Have screen recordings queued in another tab as a fallback if WiFi or the model flakes."
      },
      {
        id: 5,
        kind: "faculty-resources",
        eyebrow: "Section 01 · Take it home",
        title: "Tools by what\nyou actually do.",
        subtitle: "Scan the code. Bookmark the page. Pick one tool from one row and try it before Friday.",
        url: "https://nift-workshop.vercel.app/faculty-resources.html",
        categories: [
          {
            label: "Information processing",
            hint: "Past files, curriculum research, policy judgment, assignment reviews",
            tools: [
              { name: "ChatGPT folders",  domain: "chatgpt.com", fallback: "C" },
              { name: "Claude Projects",  domain: "claude.ai",   fallback: "C" }
            ]
          },
          {
            label: "Presentations & sheets",
            hint: "Decks, formulas, summaries, working on files inside chat",
            tools: [
              { name: "Gamma",                  domain: "gamma.app", fallback: "G" },
              { name: "Claude for Excel & PPT", domain: "claude.ai", fallback: "C" }
            ]
          },
          {
            label: "Research",
            hint: "Reading at scale, browsing-as-an-agent, deep dives",
            tools: [
              { name: "ChatGPT",              domain: "chatgpt.com",       fallback: "C" },
              { name: "Claude",               domain: "claude.ai",         fallback: "C" },
              { name: "Gemini Deep Research", domain: "gemini.google.com", fallback: "G" },
              { name: "Codex Browser",        domain: "openai.com",        fallback: "C" },
              { name: "Claude for Chrome",    domain: "claude.ai",         fallback: "C" },
              { name: "Gemini in Chrome",     domain: "chrome.google.com", fallback: "G" }
            ]
          },
          {
            label: "Posters, videos, images, infographics",
            hint: "Anything visual — quick or polished",
            tools: [
              { name: "ChatGPT image",       domain: "chatgpt.com", fallback: "C" },
              { name: "Gemini Nano Banana",  domain: "labs.google", fallback: "G" },
              { name: "Gemini Veo",          domain: "labs.google", fallback: "G" }
            ]
          }
        ],
        note: "Don't read the table aloud. Point at the QR. Tell them: 'Pick one tool from one row, try it on real work this week. That's all I'm asking.'"
      },
      {
        id: 6,
        kind: "pivot",
        eyebrow: "Section 02 · Pivot",
        title: "AI is the\nnew-age pencil.",
        subtitle: "That was AI for you. Now let's talk about why your students need to learn the pencil itself.",
        note: "Pause for two beats after the title. Don't fill the silence. Let them feel the pivot."
      },
      {
        id: 7,
        kind: "demo-stage",
        eyebrow: "Section 02 · What this pencil can do",
        title: "Let's have a quick look\nat what this {HIGHLIGHT}\ncan do.",
        highlight: "pencil",
        note: "Switch to the student deck (index.html) here. Show the master-prompt slide and a couple of student outputs. ~3 minutes. Then come back to this deck and advance to the trap slide."
      },
      {
        id: 8,
        kind: "ai-limits",
        eyebrow: "Section 02 · The trap",
        title: "Anyone can wield\nthe pencil. So what's\n{HIGHLIGHT}?",
        highlight: "left for designers",
        note: "Three things. Read the heading first, then reveal the trio. Land each definition slowly. The room should feel: 'oh, that's actually the job now.'"
      },
      {
        id: 9,
        kind: "breaker",
        eyebrow: "Activity break",
        title: "Let's do a\n{HIGHLIGHT}.",
        highlight: "quick activity",
        instruction: "30 seconds. Pick one step from your syllabus that exists because it always has. Tell your neighbor whether AI would do it faster, wider, or make it unnecessary.",
        note: "30 sec think + 60 sec pair share. Don't take answers from the room — the pairing IS the lesson. Then advance to the principle that surfaces from the activity."
      },
      {
        id: 10,
        kind: "move-claim",
        eyebrow: "Section 03 · Move 01 · Challenge the process",
        pillar: "01",
        unlock: "Unlocks Judgement",
        title: "Principles are\npermanent.\n{HIGHLIGHT}",
        highlight: "Methods are not.",
        body: "Understanding the product, the consumer, the market — that hasn't changed. The 12-step process you teach? Built for a pre-AI world. Some steps are now optional. Some are unnecessary. Some are actively wrong.",
        note: "Make this feel like permission, not provocation. Faculty are protective of their syllabus — earn the right to challenge it by anchoring on what doesn't change. They just lived this in the activity — point back to it."
      },
      {
        id: 11,
        kind: "synthesis",
        eyebrow: "Close · The whole map",
        title: "Three things you do.\nThree things they get.",
        pairs: [
          { n: "01", faculty: "Challenge the process", arrow: "→", student: "Judgement" },
          { n: "02", faculty: "AI as thinking partner", arrow: "→", student: "Framing" },
          { n: "03", faculty: "Buy your own time",     arrow: "→", student: "Taste"     }
        ],
        reveal: "The productivity stuff at the start? That was already Pillar 3. You can't shape a student's taste if you have no time to develop your own. We started there because you've already begun.",
        cta: "Pick one row. Try it before Friday. Then bring questions.",
        note: "This is the structural payoff. Read the three rows first. Then deliver the reveal — slowly. Let the room realize they've been doing it for the last 28 minutes. End on the CTA, then open Q&A."
      }
    ];

    // ─── Root component ──────────────────────────────────────────────────────
    function Faculty() {
      const total = SLIDES.length;
      const initialIndex = (() => {
        try {
          const params = new URLSearchParams(window.location.search);
          const s = parseInt(params.get("slide"), 10);
          if (!isNaN(s) && s >= 1 && s <= total) return s - 1;
        } catch (_) {}
        return 0;
      })();
      const [index, setIndex] = useState(initialIndex);
      const [subStep, setSubStep] = useState(0);
      const [showNotes, setShowNotes] = useState(false);
      const slide = SLIDES[index];
      const slideSteps = slide.steps || 1;

      // Reset subStep when slide index changes
      useEffect(() => { setSubStep(0); }, [index]);

      const next = useCallback(() => {
        if (subStep < slideSteps - 1) {
          setSubStep((s) => s + 1);
        } else {
          setIndex((i) => Math.min(total - 1, i + 1));
        }
      }, [subStep, slideSteps, total]);

      const prev = useCallback(() => {
        if (subStep > 0) {
          setSubStep((s) => s - 1);
        } else {
          setIndex((i) => Math.max(0, i - 1));
        }
      }, [subStep]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); next(); }
          else if (e.key === "ArrowLeft") { prev(); }
          else if (e.key.toLowerCase() === "f") { setShowNotes((s) => !s); }
          else if (/^[1-9]$/.test(e.key)) {
            const t = parseInt(e.key, 10) - 1;
            if (t < total) setIndex(t);
          }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [next, prev, total]);

      const exColor = slide.ex === IB ? "#5C7A3A" : slide.ex === E1 ? "#B0341E" : slide.ex === E2 ? "#1F4E8C" : "#0B0B0B";

      return (
        <div className="deck-root">
          <main
            onClick={next}
            className="relative h-screen w-screen overflow-hidden cursor-pointer select-none"
            style={{ background: "var(--paper)", color: "var(--ink)" }}
          >
            {/* Header */}
            <header className="absolute top-0 inset-x-0 z-10 flex items-center justify-between px-8 pt-5 font-mono text-[11px] uppercase tracking-[0.18em]"
                    style={{ color: "var(--muted)" }}>
              <span style={{ color: "var(--muted)", fontWeight: 600 }}>
                Info Edge × NIFT · Faculty
              </span>
              <span>{slide.segment || ""}</span>
              <span>{String(index + 1).padStart(2, "0")} / {String(total).padStart(2, "0")}</span>
            </header>

            {/* Slide body */}
            <div key={slide.id} className="slide-fade h-full w-full flex items-start justify-center px-8 pt-16 pb-14 overflow-hidden">
              <div className="w-full max-w-[1240px] h-full scroll-y pr-2">
                <SlideRenderer slide={slide} subStep={subStep} exColor={exColor} />
              </div>
            </div>

            {/* Progress */}
            <div className="absolute bottom-0 left-0 h-[3px] transition-all duration-300"
                 style={{ width: `${((index + 1) / total) * 100}%`, background: exColor }} />

            {/* Footer */}
            <footer className="absolute bottom-0 inset-x-0 z-10 flex items-center justify-between px-8 pb-4 font-mono text-[11px] uppercase tracking-[0.18em]"
                    style={{ color: "var(--muted)" }}>
              <div className="flex gap-5">
                <button onClick={(e) => { e.stopPropagation(); prev(); }} className="hover:text-black transition">← Prev</button>
                <button onClick={(e) => { e.stopPropagation(); next(); }} className="hover:text-black transition">Next →</button>
                <a href="/" onClick={(e) => e.stopPropagation()} className="hover:text-black transition">↗ Student deck</a>
              </div>
              <div className="flex gap-5">
                {slide.note && (
                  <button onClick={(e) => { e.stopPropagation(); setShowNotes((s) => !s); }} className="hover:text-black transition">
                    {showNotes ? "Hide notes [F]" : "Notes [F]"}
                  </button>
                )}
              </div>
            </footer>

            {showNotes && slide.note && (
              <aside
                onClick={(e) => e.stopPropagation()}
                className="absolute right-5 bottom-12 z-20 w-[340px] p-4 cursor-auto"
                style={{ background: "var(--ink)", color: "var(--paper)", boxShadow: "0 20px 60px -20px rgba(0,0,0,0.4)" }}
              >
                <div className="font-mono text-[10px] uppercase tracking-[0.2em] mb-2 opacity-60">Margin note</div>
                <p className="text-[14px] leading-[1.55]">{slide.note}</p>
              </aside>
            )}
          </main>
        </div>
      );
    }

    function SlideRenderer({ slide, subStep, exColor }) {
      switch (slide.kind) {
        case "hands-up":      return <HandsUpSlide slide={slide} subStep={subStep} />;
        case "quick-check":   return <QuickCheckSlide slide={slide} />;
        case "hook":          return <HookSlide slide={slide} />;
        case "demo-stage":    return <DemoStageSlide slide={slide} />;
        case "faculty-resources": return <FacultyResourcesSlide slide={slide} />;
        case "pivot":         return <PivotSlide slide={slide} />;
        case "medium-claim":  return <MediumClaimSlide slide={slide} />;
        case "ai-limits":     return <AiLimitsSlide slide={slide} />;
        case "move-claim":    return <MoveClaimSlide slide={slide} />;
        case "move-practice": return <MovePracticeSlide slide={slide} />;
        case "breaker":       return <BreakerSlide slide={slide} />;
        case "synthesis":     return <SynthesisSlide slide={slide} />;
        case "intro":         return <IntroSlide />;
        case "cover":         return <CoverSlide slide={slide} />;
        case "outcome":       return <OutcomeSlide slide={slide} exColor={exColor} />;
        case "scene":         return <SceneSlide slide={slide} exColor={exColor} />;
        case "groups":        return <GroupsSlide slide={slide} exColor={exColor} />;
        case "scaffold-3":    return <Scaffold3Slide slide={slide} exColor={exColor} />;
        case "scaffold-5":    return <Scaffold5Slide slide={slide} exColor={exColor} />;
        case "sketch":        return <SketchSlide slide={slide} exColor={exColor} />;
        case "gallery":       return <GallerySlide slide={slide} exColor={exColor} />;
        case "success":       return <SuccessSlide slide={slide} exColor={exColor} />;
        case "rescue":        return <RescueSlide slide={slide} exColor={exColor} />;
        case "ib-cover":      return <IbCoverSlide slide={slide} exColor={exColor} />;
        case "ib-why":        return <IbWhySlide slide={slide} exColor={exColor} />;
        case "ib-setup":      return <IbSetupSlide slide={slide} exColor={exColor} />;
        case "ib-script":     return <IbScriptSlide slide={slide} exColor={exColor} />;
        case "ib-reveal":     return <IbRevealSlide slide={slide} exColor={exColor} />;
        case "ib-callbacks":  return <IbCallbacksSlide slide={slide} exColor={exColor} />;
        case "compare":       return <CompareSlide />;
        default:              return null;
      }
    }

    // ─── Slide layouts ───────────────────────────────────────────────────────
    function IntroSlide() {
      return (
        <div className="grid grid-cols-12 gap-7 pt-4">
          <div className="col-span-12 flex items-center gap-3 mb-2">
            <span className="font-mono text-[11px] uppercase tracking-[0.2em] px-2 py-1" style={{ border: "1px solid var(--ink)" }}>
              Internal · Facilitator only
            </span>
            <span className="font-mono text-[11px] uppercase tracking-[0.2em]" style={{ color: "var(--muted)" }}>
              Not for student audience
            </span>
          </div>

          <h1 className="col-span-12 display-serif font-light leading-[0.96]"
              style={{ fontSize: "clamp(48px, 6.5vw, 92px)", letterSpacing: "-0.03em" }}>
            Three activities.<br />
            <em style={{ color: "var(--accent)", fontStyle: "italic" }}>One we always run. Two we choose between.</em>
          </h1>

          <div className="col-span-7 mt-4">
            <p className="text-[17px] leading-[1.55] mb-4">
              The icebreaker runs every workshop — no exceptions. Then Mess Queue OR Open Day,
              picked on the day based on the room. This deck is the pilot's checklist for all
              three: minute by minute, script by script, rescue by rescue.
            </p>
            <p className="text-[15px] leading-[1.55]" style={{ color: "var(--muted)" }}>
              The accent colour at the top of every slide tells you which activity you're in —
              moss green for the icebreaker, clay red for Mess Queue, ink blue for Open Day.
            </p>
          </div>

          <div className="col-span-5 mt-4 grid grid-cols-1 gap-2">
            <div className="p-3" style={{ background: "#FFF", border: "1px solid var(--line)", borderLeft: "4px solid #5C7A3A" }}>
              <div className="flex items-baseline justify-between mb-1">
                <div className="font-mono text-[10px] uppercase tracking-[0.2em]" style={{ color: "#5C7A3A" }}>Always run · 12 min</div>
                <div className="font-mono text-[10px] uppercase tracking-[0.2em]" style={{ color: "var(--muted)" }}>Min 15–27</div>
              </div>
              <div className="display-serif text-[22px] leading-[1.05]">Broken Telephone, Drawn</div>
              <div className="text-[12px] mt-1" style={{ color: "var(--muted)" }}>Icebreaker · forms the trios</div>
            </div>
            <div className="p-3" style={{ background: "#FFF", border: "1px solid var(--line)", borderLeft: "4px solid #B0341E" }}>
              <div className="font-mono text-[10px] uppercase tracking-[0.2em] mb-1" style={{ color: "#B0341E" }}>Pick one of two · 25 min</div>
              <div className="display-serif text-[22px] leading-[1.05]">The Mess Queue</div>
              <div className="text-[12px] mt-1" style={{ color: "var(--muted)" }}>Lower difficulty · safer pick</div>
            </div>
            <div className="p-3" style={{ background: "#FFF", border: "1px solid var(--line)", borderLeft: "4px solid #1F4E8C" }}>
              <div className="font-mono text-[10px] uppercase tracking-[0.2em] mb-1" style={{ color: "#1F4E8C" }}>Pick one of two · 25 min</div>
              <div className="display-serif text-[22px] leading-[1.05]">The Open Day</div>
              <div className="text-[12px] mt-1" style={{ color: "var(--muted)" }}>Higher difficulty · higher ceiling</div>
            </div>
          </div>

          <div className="col-span-12 mt-2 font-mono text-[11px] uppercase tracking-[0.2em]" style={{ color: "var(--muted)" }}>
            → / Space  advance · ←  back · F  toggle notes · 1–9  jump
          </div>
        </div>
      );
    }

    // ─── Icebreaker slides ───────────────────────────────────────────────────
    function IbCoverSlide({ slide, exColor }) {
      return (
        <div className="grid grid-cols-12 gap-8">
          <div className="col-span-12 mb-2">
            <span className="font-mono text-[11px] uppercase tracking-[0.2em] px-2 py-1"
                  style={{ background: exColor, color: "var(--paper)" }}>
              {slide.ex}
            </span>
          </div>

          <h2 className="col-span-12 display-serif font-light leading-[0.96]"
              style={{ fontSize: "clamp(54px, 6.8vw, 96px)", letterSpacing: "-0.028em" }}>
            {slide.name}
          </h2>

          <p className="col-span-9 text-[22px] leading-[1.4] mt-2" style={{ color: "var(--ink-soft)" }}>
            {slide.summary}
          </p>

          <div className="col-span-12 grid grid-cols-3 gap-6 mt-8">
            <div className="pt-4" style={{ borderTop: `2px solid ${exColor}` }}>
              <div className="font-mono text-[10px] uppercase tracking-[0.2em] mb-2" style={{ color: "var(--muted)" }}>Duration</div>
              <div className="text-[16px] leading-[1.45]">{slide.duration}</div>
            </div>
            <div className="pt-4" style={{ borderTop: `2px solid ${exColor}` }}>
              <div className="font-mono text-[10px] uppercase tracking-[0.2em] mb-2" style={{ color: "var(--muted)" }}>When in the workshop</div>

    function ToolAvatar({ tool, offset, size = 56 }) {
      const curatedUrl = BRAND_LOGOS[tool.domain];
      const faviconUrl = `https://www.google.com/s2/favicons?domain=${tool.domain}&sz=128`;
      const urls = [curatedUrl, faviconUrl].filter(Boolean);
      const [stage, setStage] = useState(0);
      const errored = stage >= urls.length;
      const url = urls[stage];
      return (
        <div
          style={{
            width: size,
            height: size,
            borderRadius: "50%",
            background: "#FFFFFF",
            border: "2px solid var(--paper)",
            boxShadow: "0 0 0 1px var(--line), 0 2px 6px rgba(18,22,40,0.05)",
            marginLeft: offset > 0 ? `-${Math.round(size * 0.32)}px` : "0",
            zIndex: 100 - offset,
            position: "relative",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            flexShrink: 0
          }}
        >
          {errored ? (
            <span
              className="display-serif"
              style={{
                fontSize: size * 0.42,
                fontWeight: 500,
                color: "var(--ink)",
                letterSpacing: "-0.02em"
              }}
            >
              {tool.fallback || tool.name[0]}
            </span>
          ) : (
            <img
              src={url}
              alt=""
              onError={() => setStage((s) => s + 1)}
              style={{
                width: size * 0.58,
                height: size * 0.58,
                display: "block",
                objectFit: "contain"
              }}
            />
          )}
        </div>
      );
    }

        { dim: "Failure mode",       e1: "Settling for surface fixes",        e2: "Drifting into vibes-only" },
        { dim: "Teaches",            e1: "Observation, constraint, friction", e2: "Journey, persona, choreography" },
        { dim: "Output type",        e1: "Diagrams, flows, system sketches",  e2: "Storyboards, scenes, scripts" },
        { dim: "Verbal demand",      e1: "Low — sketches speak",              e2: "High — moments need narration" }
      ];
      return (
        <div className="grid grid-cols-12 gap-5">
          <div className="col-span-12 mb-2">
            <span className="font-mono text-[11px] uppercase tracking-[0.2em] px-2 py-1"
                  style={{ border: "1px solid var(--ink)" }}>
              Decision matrix
            </span>
          </div>
          <h2 className="col-span-12 display-serif font-light leading-[1] mb-1"
              style={{ fontSize: "clamp(38px, 4.5vw, 64px)", letterSpacing: "-0.025em" }}>
            Which one to pick.
          </h2>
          <p className="col-span-12 text-[15px]" style={{ color: "var(--muted)" }}>
            Decide by minute 30 of the workshop, based on the room — not before.
          </p>

          <div className="col-span-12 mt-4">
            <table className="compare">
              <thead>
                <tr>
                  <th style={{ width: "22%" }}>Dimension</th>
                  <th style={{ width: "39%", color: "#B0341E" }}>Exercise 1 · Mess Queue</th>
                  <th style={{ width: "39%", color: "#1F4E8C" }}>Exercise 2 · Open Day</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => (
                  <tr key={i}>
                    <td style={{ color: "var(--muted)" }}>{r.dim}</td>
                    <td>{r.e1}</td>
                    <td>{r.e2}</td>
                  </tr>
                ))}
                <tr className="recommend">
                  <td style={{ color: "var(--accent)", fontWeight: 700 }}>Default</td>
                  <td colSpan="2">
                    <strong>Pick Mess Queue unless the first 30 min of the workshop tells you the room is verbal, confident, and engaged.</strong>
                    <span className="block mt-1 text-[14px] italic" style={{ color: "var(--muted)" }}>
                      Mess Queue is harder to fail. Open Day is higher ceiling but needs the room to meet it.
                    </span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ─── Mount ───────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Faculty />);
    const boot = document.getElementById("boot");
    if (boot) {
      requestAnimationFrame(() => {
        boot.classList.add("hidden");
        setTimeout(() => boot.remove(), 350);
      });
    }
  </script>
</body>
</html>
