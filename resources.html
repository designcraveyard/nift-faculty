<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>The AI field guide · NIFT × Info Edge</title>
  <meta name="description" content="A hand-picked, India-first directory of AI creators, channels, tools, and quick wins for design students. Companion to the NIFT × Info Edge workshop." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["'Inter Tight'", "ui-sans-serif", "system-ui"],
            serif: ["'Fraunces'", "Georgia", "serif"],
            mono: ["'JetBrains Mono'", "ui-monospace", "monospace"]
          }
        }
      }
    };
  </script>

  <style>
    :root {
      --paper:      #F7F4EC;
      --paper-soft: #EFEADD;
      --paper-deep: #E6DFCC;
      --ink:        #0B0B0B;
      --ink-soft:   #2A2622;
      --muted:      #6B6158;
      --muted-soft: #8A7F73;
      --line:       #E0D9C8;
      --line-soft:  #ECE5D2;
      --accent:     #D93A1F;
      --accent-deep:#A82912;
      --gold:       #B89556;
    }
    html, body { background: var(--paper); color: var(--ink); }
    body {
      margin: 0;
      font-family: 'Inter Tight', -apple-system, system-ui, sans-serif;
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .display-serif {
      font-family: 'Fraunces', Georgia, serif;
      font-variation-settings: "SOFT" 30, "opsz" 144;
    }
    .display-soft {
      font-family: 'Fraunces', Georgia, serif;
      font-variation-settings: "SOFT" 60, "opsz" 144;
    }
    .display-italic {
      font-family: 'Fraunces', Georgia, serif;
      font-variation-settings: "SOFT" 100, "opsz" 144;
      font-style: italic;
    }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .label-mono {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }
    a { color: inherit; text-decoration: none; }
    button { background: transparent; border: none; padding: 0; font: inherit; color: inherit; cursor: pointer; }
    input { font: inherit; color: inherit; }

    /* ─── Filter bar ─── */
    .filter-bar {
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: rgba(247, 244, 236, 0.93);
      border-bottom: 1px solid var(--line);
    }
    .scroll-x { overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
    .scroll-x::-webkit-scrollbar { display: none; }
    .scroll-y { overflow-y: auto; }

    /* ─── Drawer ─── */
    .drawer-backdrop {
      position: fixed; inset: 0;
      background: rgba(11, 11, 11, 0.45);
      backdrop-filter: blur(2px);
      z-index: 60;
    }
    .drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 100%;
      max-width: 440px;
      background: var(--paper);
      z-index: 70;
      overflow-y: auto;
      animation: drawer-in 280ms cubic-bezier(0.2,0.7,0.2,1);
    }
    @keyframes drawer-in {
      from { transform: translateX(8%); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }
    .drawer.drawer-left {
      right: auto;
      left: 0;
      animation: drawer-in-left 280ms cubic-bezier(0.2,0.7,0.2,1);
    }
    @keyframes drawer-in-left {
      from { transform: translateX(-8%); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }
    .nav-row {
      width: 100%;
      padding: 12px 16px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      border-radius: 10px;
      transition: background 160ms ease;
      text-align: left;
    }
    .nav-row:hover { background: var(--paper-soft); }
    .ham-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px; height: 38px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #FBFAF4;
      flex-shrink: 0;
      cursor: pointer;
      transition: border-color 160ms ease;
    }
    .ham-btn:hover { border-color: var(--ink-soft); }
    .ham-btn .bars { display: flex; flex-direction: column; gap: 4px; }
    .ham-btn .bars span {
      display: block;
      width: 16px; height: 1.5px;
      background: var(--ink-soft);
      border-radius: 2px;
    }

    /* ─── Chips ─── */
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #FBFAF4;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--ink-soft);
      white-space: nowrap;
      transition: all 160ms ease;
      cursor: pointer;
    }
    .chip:hover { border-color: var(--ink-soft); }
    .chip.active {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }
    .chip.accent.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #FFF;
    }

    /* ─── Cards ─── */
    .card {
      background: #FBFAF4;
      border: 1px solid var(--line);
      border-radius: 14px;
      transition: transform 200ms ease, border-color 200ms ease, box-shadow 200ms ease;
    }
    .card:hover {
      border-color: var(--ink-soft);
      box-shadow: 0 8px 30px -12px rgba(11, 11, 11, 0.18);
      transform: translateY(-2px);
    }
    .card.flat:hover { transform: none; box-shadow: none; }
    .card.hero {
      background: linear-gradient(180deg, #FBFAF4 0%, #F4EFE0 100%);
    }

    /* type tag */
    .ttag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .ttag.accent { color: var(--accent); }

    /* lite YT */
    .lite-yt {
      position: relative;
      aspect-ratio: 16/9;
      background: #1A1A1A center / cover no-repeat;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
    }
    .lite-yt::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 55%, rgba(0,0,0,0.55));
    }
    .lite-yt .play {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%,-50%);
      width: 64px; height: 44px;
      background: var(--accent);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      transition: transform 200ms ease, background 200ms ease;
    }
    .lite-yt:hover .play { transform: translate(-50%,-50%) scale(1.06); background: var(--accent-deep); }
    .lite-yt .play::after {
      content: "";
      width: 0; height: 0;
      border-left: 14px solid #FFF;
      border-top: 9px solid transparent;
      border-bottom: 9px solid transparent;
      margin-left: 4px;
    }
    .lite-yt .duration {
      position: absolute; bottom: 10px; right: 10px;
      background: rgba(0,0,0,0.75); color: #fff;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      padding: 3px 7px; border-radius: 4px;
    }
    .yt-frame { aspect-ratio: 16/9; width: 100%; border: 0; border-radius: 12px; background: #000; }

    /* vertical (shorts/reels) */
    .vlite {
      position: relative;
      aspect-ratio: 9/16;
      background: #1A1A1A center / cover no-repeat;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
    }
    .vlite::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.6));
    }
    .vlite .play {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%,-50%);
      width: 56px; height: 56px; border-radius: 999px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
    }
    .vlite .play::after {
      content: "";
      width: 0; height: 0;
      border-left: 14px solid #FFF;
      border-top: 9px solid transparent;
      border-bottom: 9px solid transparent;
      margin-left: 4px;
    }
    .vlite .label {
      position: absolute; bottom: 12px; left: 12px; right: 12px;
      color: #fff;
      font-family: 'Fraunces', Georgia, serif;
      font-variation-settings: "SOFT" 30, "opsz" 144;
      font-size: 17px;
      line-height: 1.15;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .vlite .creator {
      position: absolute; top: 12px; left: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.92);
      background: rgba(0,0,0,0.42);
      padding: 4px 9px;
      border-radius: 999px;
      backdrop-filter: blur(6px);
    }
    .v-frame {
      aspect-ratio: 9/16;
      width: 100%;
      border: 0;
      border-radius: 12px;
      background: #000;
      display: block;
    }
    .v-frame.ig { aspect-ratio: auto; height: 720px; max-height: 86vh; background: #fff; }

    /* gradient avatar (channels/people without thumb) */
    .av {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .av .glyph {
      font-family: 'Fraunces', Georgia, serif;
      font-variation-settings: "SOFT" 30, "opsz" 144;
      font-weight: 600;
      color: #FFF;
      font-size: clamp(28px, 5vw, 56px);
      letter-spacing: 0.01em;
      text-shadow: 0 2px 24px rgba(0,0,0,0.25);
    }
    .av .photo {
      width: 34%;
      max-width: 104px;
      aspect-ratio: 1;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.94);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.34);
      background: rgba(0, 0, 0, 0.1);
    }
    .av-circle {
      width: 22px; height: 22px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255,255,255,0.18);
      border: 1.5px solid rgba(255,255,255,0.7);
    }
    .av .ptag {
      position: absolute; bottom: 10px; right: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.92);
      background: rgba(0,0,0,0.32);
      padding: 4px 9px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
    }

    /* tiny inline avatar/favicon for compact cards */
    .av-tiny {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600; color: #fff;
      font-size: 12px;
    }
    .fav-tiny {
      width: 28px; height: 28px;
      border-radius: 8px;
      object-fit: contain;
      background: var(--paper-deep);
      flex-shrink: 0;
      padding: 4px;
    }

    .accent-underline {
      background-image: linear-gradient(180deg, transparent 62%, rgba(217, 58, 31, 0.22) 62%);
      padding: 0 2px;
    }
    .rule-soft { border-top: 1px dashed var(--line); }

    .fade-in { animation: fade-up 360ms ease both; }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: var(--paper); color: var(--muted);
      font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.2em;
      text-transform: uppercase; z-index: 100;
      transition: opacity 300ms ease;
    }
    .boot.hidden { opacity: 0; pointer-events: none; }

    @media (max-width: 640px) {
      .display-hero { font-size: clamp(40px, 11vw, 60px); }
    }
  </style>
</head>
<body>
  <div id="boot" class="boot">Loading the field guide…</div>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="typescript,react">
    const { useCallback, useEffect, useMemo, useRef, useState } = React;

    // ─── Constants ───────────────────────────────────────────────────────────
    const TYPE_LABEL = {
      video: 'Video', short: 'Short', reel: 'Reel', channel: 'Channel',
      tool: 'Tool', course: 'Course', article: 'Read', newsletter: 'Newsletter',
      community: 'Community', post: 'Thread', tip: 'Tip',
    };

    const PLATFORM_LABEL = {
      youtube: 'YouTube', instagram: 'Instagram', x: 'X', web: 'Web',
      github: 'GitHub', substack: 'Substack', reddit: 'Reddit',
      discord: 'Discord', podcast: 'Podcast', blog: 'Blog',
    };

    const SECTIONS = [
      { id: 'start',         title: 'If you only have an hour',        intro: 'A seven-step path. Do these in order. By the end, you will have done more AI homework than 95 percent of your batch.' },
      { id: 'daily',         title: 'The daily drivers',                intro: 'The chatbots you will actually use every day. Pick two. Switch when one starts to feel boring.' },
      { id: 'india',         title: 'From India, for builders',         intro: 'The Indian AI internet has its own gravity. These are the channels that are doing real work — not the ones with AI in the bio.' },
      { id: 'reels',         title: 'Reels & shorts to watch on the bus', intro: 'Lazy-loaded so the page stays fast. Tap to play, scroll to skip. India-leaning, mixed in with the global heavyweights.' },
      { id: 'fundamentals',  title: 'Learn how the magic works',        intro: 'The Karpathy curriculum, plus the gentlest detours. None of this requires writing code. All of it changes how you talk about AI.' },
      { id: 'code',          title: 'Vibe coding',                      intro: 'Type what you want, watch software appear. NIFT students with zero coding background are shipping live apps in an afternoon. You can too.' },
      { id: 'design',        title: 'Designing with AI',                intro: 'Tools that turn a prompt into a real, editable interface — plus the three best designers on the internet to follow while you learn.' },
      { id: 'image',         title: 'Make an image',                    intro: 'After three years, this is no longer a novelty. Pick one to learn deeply. Switch when you outgrow it.' },
      { id: 'photo',         title: 'Make a better photo',              intro: 'Restoration, upscaling, headshots, retouching. Everything except the click of the shutter.' },
      { id: 'film',          title: 'Make a film',                      intro: 'You will need three things to make a real AI short: a video model, a voice tool, and the discipline to throw out 90 percent of what you generate.' },
      { id: 'sound',         title: 'Make a sound',                     intro: 'Suno will write you a full song with vocals in 90 seconds. Whether that is a good idea is a different question.' },
      { id: '3d',            title: 'Spatial & 3D',                     intro: 'Still early. The tools are improving fast. If you want to be the person who is fluent here in two years, start now.' },
      { id: 'game',          title: 'Make a game',                      intro: 'Mostly asset generators and NPC tools today. The "prompt-to-playable-game" pitch is real but rough. Try, expect to be patient.' },
      { id: 'agent',         title: 'The agentic web',                  intro: 'The plumbing being laid right now for software that does work for you. Read the MCP article, even if you only build one agent.' },
      { id: 'research',      title: 'For your research papers',         intro: 'Use these instead of Google Scholar. NotebookLM in particular will change how you study.' },
      { id: 'lectures',      title: 'Long lectures for the weekend',    intro: 'Two-to-five hours each. Watch on the laptop with notes open. These are the conversations that will be cited for the next decade.' },
      { id: 'inbox',         title: 'Five things to put in your inbox', intro: 'You cannot keep up with AI by checking Twitter. You can keep up by reading two newsletters, slowly, in the morning.' },
      { id: 'follow',        title: 'Worth following',                  intro: 'X is still the AI town square. These are the accounts I would import to a fresh login.' },
      { id: 'tips',          title: 'Quick wins',                       intro: 'Five things you can do in five minutes that will permanently raise the ceiling of what AI does for you.' },
    ];

    // Filter dimensions
    const TOPICS = [
      { id: 'all',          label: 'All' },
      { id: 'general',      label: 'Daily drivers' },
      { id: 'fundamentals', label: 'Fundamentals' },
      { id: 'india',        label: 'India' },
      { id: 'vibe-coding',  label: 'Vibe coding' },
      { id: 'ui-design',    label: 'UI / UX' },
      { id: 'illustration', label: 'Illustration' },
      { id: 'photography',  label: 'Photography' },
      { id: 'video',        label: 'Video' },
      { id: 'music',        label: 'Music & audio' },
      { id: '3d',           label: '3D' },
      { id: 'game',         label: 'Games' },
      { id: 'agentic',      label: 'Agentic' },
      { id: 'research',     label: 'Research' },
    ];
    const TYPES = [
      { id: 'all',        label: 'All formats' },
      { id: 'video',      label: 'Videos' },
      { id: 'short',      label: 'Shorts' },
      { id: 'reel',       label: 'Reels' },
      { id: 'channel',    label: 'Channels' },
      { id: 'tool',       label: 'Tools' },
      { id: 'course',     label: 'Courses' },
      { id: 'article',    label: 'Reads' },
      { id: 'newsletter', label: 'Newsletters' },
      { id: 'community',  label: 'Communities' },
      { id: 'tip',        label: 'Tips' },
    ];
    const REGIONS = [
      { id: 'all',    label: 'All' },
      { id: 'in',     label: 'India' },
      { id: 'global', label: 'Global' },
    ];

    // Gradient palette (deterministic)
    const GRADIENTS = [
      'linear-gradient(135deg, #E07A5F 0%, #D93A1F 100%)',
      'linear-gradient(135deg, #3D405B 0%, #1A1B2E 100%)',
      'linear-gradient(135deg, #81B29A 0%, #355C4D 100%)',
      'linear-gradient(135deg, #F2CC8F 0%, #B89556 100%)',
      'linear-gradient(135deg, #2A9D8F 0%, #14463F 100%)',
      'linear-gradient(135deg, #E63946 0%, #761A23 100%)',
      'linear-gradient(135deg, #6D597A 0%, #311F3A 100%)',
      'linear-gradient(135deg, #355070 0%, #14213D 100%)',
      'linear-gradient(135deg, #B5838D 0%, #6D464E 100%)',
      'linear-gradient(135deg, #8D6A9F 0%, #4A2D5F 100%)',
      'linear-gradient(135deg, #006D77 0%, #023135 100%)',
      'linear-gradient(135deg, #D62828 0%, #5C0F0F 100%)',
      'linear-gradient(135deg, #457B9D 0%, #1D3557 100%)',
      'linear-gradient(135deg, #BC6C25 0%, #5C3413 100%)',
    ];
    const hashStr = (s) => { let h = 0; for (let i = 0; i < s.length; i++) h = (h << 5) - h + s.charCodeAt(i); return Math.abs(h); };
    const gradientFor = (id) => GRADIENTS[hashStr(id) % GRADIENTS.length];
    const initialsFor = (name) => {
      if (!name) return '?';
      const w = name.replace(/[^A-Za-z0-9 &]/g, '').split(/\s+/).filter(Boolean);
      if (w.length === 1) return w[0].slice(0, 2).toUpperCase();
      return (w[0][0] + w[w.length - 1][0]).toUpperCase();
    };
    const domainOf = (url) => { try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return ''; } };
    const faviconFor = (url) => { const d = domainOf(url); return d ? `https://www.google.com/s2/favicons?domain=${d}&sz=128` : ''; };
    const ytThumb = (id) => `https://img.youtube.com/vi/${id}/hqdefault.jpg`;

    // Hand-verified handle map for creators whose name doesn't appear in the URL
    // (e.g. video lectures where the URL is the video, not the channel).
    // Each value is a stable unavatar.io URL — the right face per right name.
    const CREATOR_HANDLES = {
      'Andrej Karpathy':       'https://unavatar.io/x/karpathy',
      '3Blue1Brown':           'https://unavatar.io/youtube/3blue1brown',
      'Ethan Mollick':         'https://unavatar.io/x/emollick',
      'Lex Fridman Podcast':   'https://unavatar.io/x/lexfridman',
      'Varun Mayya':           'https://unavatar.io/instagram/thevarunmayya',
      '100x Engineers':        'https://unavatar.io/instagram/100xengineers',
      'Brian Lovin':           'https://unavatar.io/x/brian_lovin',
      'Simon Willison':        'https://unavatar.io/x/simonw',
    };

    // Resolve a creator profile image. Order: explicit avatar field →
    // URL handle extraction → name dictionary → @handle in creator field.
    // Falls back to gradient + initials when nothing resolves.
    function avatarFor(item) {
      if (item && item.avatar) return item.avatar;
      const url = (item && item.url) || '';

      // X / Twitter
      let m = url.match(/(?:x\.com|twitter\.com)\/([A-Za-z0-9_]+)/i);
      if (m && m[1] && !['home', 'search', 'i', 'explore'].includes(m[1].toLowerCase())) {
        return `https://unavatar.io/x/${m[1]}`;
      }
      // YouTube /@handle
      m = url.match(/youtube\.com\/@([A-Za-z0-9_.-]+)/i);
      if (m) return `https://unavatar.io/youtube/${m[1]}`;
      // YouTube /c/HANDLE or /channel/UC...
      m = url.match(/youtube\.com\/(?:c\/|channel\/)([A-Za-z0-9_-]+)/i);
      if (m) return `https://unavatar.io/youtube/${m[1]}`;
      // Instagram (could be /USERNAME/ or /USERNAME/reel/CODE/)
      m = url.match(/instagram\.com\/([A-Za-z0-9_.]+)/i);
      if (m && m[1] && !['reel', 'p', 'explore', 'tv', 'stories'].includes(m[1].toLowerCase())) {
        return `https://unavatar.io/instagram/${m[1]}`;
      }
      // GitHub user
      m = url.match(/github\.com\/([A-Za-z0-9_-]+)(?:\/|$|\?|#)/i);
      if (m && m[1] && !['orgs', 'about', 'features'].includes(m[1].toLowerCase())) {
        return `https://github.com/${m[1]}.png?size=200`;
      }
      // Hand-verified name lookup (for video entries whose URL is the video,
      // not the channel — Karpathy lectures, 3Blue1Brown, Mollick talk, etc.)

    // ─── Helpers / lazy embed ───────────────────────────────────────────────
    function useInView(rootMargin = '300px') {
      const ref = useRef(null);
      const [inView, setInView] = useState(false);
      useEffect(() => {
        if (inView || !ref.current) return;
        const el = ref.current;
        const obs = new IntersectionObserver((entries) => {
          if (entries[0].isIntersecting) { setInView(true); obs.disconnect(); }
        }, { rootMargin });
        obs.observe(el);
        return () => obs.disconnect();
      }, [inView, rootMargin]);
      return [ref, inView];
    }

    // ─── Tiny inline avatar (creator dot) ──────────────────────────────────
    function MiniAvatar({ item, size }) {
      const url = avatarFor(item);
      const [failed, setFailed] = useState(false);
      if (!url || failed) return null;
      const sz = size || 22;
      return (
        <img
          src={url}
          alt=""
          className="av-circle"
          style={{ width: sz, height: sz }}
          loading="lazy"
          onError={() => setFailed(true)}
        />
      );
    }

    // ─── Card variants ──────────────────────────────────────────────────────
    function YTLite({ item, big }) {
      const [playing, setPlaying] = useState(false);
      if (playing) {
        return (
          <iframe
            className="yt-frame"
            src={`https://www.youtube.com/embed/${item.embedId}?autoplay=1&rel=0`}
            title={item.title}
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
            allowFullScreen
          />
        );
      }
      return (
        <button
          className="lite-yt w-full"
          onClick={(e) => { e.stopPropagation(); setPlaying(true); }}
          aria-label={`Play ${item.title}`}
          style={{ backgroundImage: `url(${ytThumb(item.embedId)})` }}
        >
          <span className="play" aria-hidden="true" />
          {item.duration && <span className="duration">{item.duration}</span>}
        </button>
      );
    }

    // Lazy YT short — vertical, only loads embed when in view AND user clicks play
    function YTShortCard({ item }) {
      const [holderRef, inView] = useInView();
      const [playing, setPlaying] = useState(false);
      return (
        <article className="card flat p-3 fade-in" ref={holderRef}>
          <div className="vlite" style={inView ? { backgroundImage: `url(${ytThumb(item.embedId)})` } : { background: gradientFor(item.id) }}>
            {playing ? (
              <iframe
                className="v-frame"
                src={`https://www.youtube.com/embed/${item.embedId}?autoplay=1&rel=0&playsinline=1`}
                title={item.title}
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
                allowFullScreen
                style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}
              />
            ) : (
              <button onClick={() => setPlaying(true)} aria-label={`Play ${item.title}`} className="absolute inset-0 w-full h-full">
                <span className="creator" style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                  <MiniAvatar item={item} size={16} />
                  {item.creator}
                </span>
                <span className="play" aria-hidden="true" />
                <span className="label">{item.title}</span>
              </button>
            )}
          </div>
          <div className="mt-3 px-1">
            <div className="ttag">YT Short {item.region === 'in' ? '· India' : ''}</div>
            {item.summary && <p className="mt-1.5" style={{ fontSize: 13, lineHeight: 1.5, color: 'var(--ink-soft)' }}>{item.summary}</p>}
          </div>
        </article>
      );
    }

    // Instagram reel — uses the public /embed/ iframe URL, no script required
    function IGReelCard({ item }) {
      const [holderRef, inView] = useInView();
      const [active, setActive] = useState(false);
      // Extract the path /reel/CODE/ from the URL
      const embedSrc = useMemo(() => {
        try {
          const u = new URL(item.embedUrl || item.url);
          const cleanPath = u.pathname.endsWith('/') ? u.pathname : u.pathname + '/';
          return `https://www.instagram.com${cleanPath}embed/`;
        } catch { return ''; }
      }, [item.embedUrl, item.url]);
      return (
        <article className="card flat p-3 fade-in" ref={holderRef}>
          {active && inView ? (
            <iframe
              className="v-frame ig"
              src={embedSrc}
              title={item.title}
              scrolling="no"
              allow="encrypted-media; picture-in-picture; web-share"
              allowtransparency="true"
            />
          ) : (
            <button
              className="vlite w-full"
              onClick={() => setActive(true)}
              aria-label={`Play ${item.title}`}
              style={{ background: gradientFor(item.id) }}
            >
              <span className="creator">{item.creator}</span>
              <span className="play" aria-hidden="true" />
              <span className="label">{item.title}</span>
            </button>
          )}
          <div className="mt-3 px-1">
            <div className="ttag">Instagram Reel {item.region === 'in' ? '· India' : ''}</div>
            {item.summary && <p className="mt-1.5" style={{ fontSize: 13, lineHeight: 1.5, color: 'var(--ink-soft)' }}>{item.summary}</p>}
          </div>
        </article>
      );
    }

    // Compact tool/article/community card — favicon led, minimal chrome
    function CompactCard({ item }) {
      const fav = faviconFor(item.url);
      const isOpen = (e) => { e.stopPropagation(); window.open(item.url, '_blank', 'noopener,noreferrer'); };
      return (
        <a href={item.url} target="_blank" rel="noopener noreferrer" className="card p-4 sm:p-5 fade-in flex flex-col" style={{ minHeight: 0 }}>
          <div className="flex items-start gap-3 mb-3">
            <img src={fav} alt="" className="fav-tiny" onError={(e) => { e.target.style.background = gradientFor(item.id); e.target.src = ''; }} />
            <div className="flex-1 min-w-0">
              <div className="ttag">{TYPE_LABEL[item.type]}{item.region === 'in' ? ' · India' : ''}</div>
              <h3 className="display-soft leading-tight mt-0.5" style={{ fontSize: 19, fontWeight: 500 }}>{item.title}</h3>
              {item.creator && <div className="mono mt-0.5" style={{ fontSize: 11, color: 'var(--muted)' }}>{item.creator}</div>}
            </div>
          </div>
          {item.summary && <p style={{ fontSize: 13.5, lineHeight: 1.55, color: 'var(--ink-soft)' }}>{item.summary}</p>}
          <div className="mt-3 pt-2 rule-soft flex items-center justify-between">
            <span className="mono" style={{ fontSize: 10, color: 'var(--muted-soft)', letterSpacing: '0.04em' }}>{domainOf(item.url)}</span>
            <span className="mono" style={{ fontSize: 10, color: 'var(--accent)', letterSpacing: '0.12em', textTransform: 'uppercase' }}>Open ↗</span>
          </div>
        </a>
      );
    }

    // Channel / creator card — gradient + circular profile photo
    function ChannelCard({ item }) {
      const grad = gradientFor(item.id);
      const initials = initialsFor(item.title);
      const avatarUrl = avatarFor(item);
      const [imgFailed, setImgFailed] = useState(false);
      return (
        <a href={item.url} target="_blank" rel="noopener noreferrer" className="card p-4 sm:p-5 fade-in flex flex-col" style={{ minHeight: 0 }}>
          <div className="av" style={{ background: grad }}>
            {avatarUrl && !imgFailed ? (
              <img
                src={avatarUrl}
                alt={item.title}
                className="photo"
                loading="lazy"
                onError={() => setImgFailed(true)}
              />
            ) : (
              <span className="glyph">{initials}</span>
            )}
            <span className="ptag">{PLATFORM_LABEL[item.platform] || ''}</span>
          </div>
          <div className="mt-3">
            <div className="ttag">{TYPE_LABEL[item.type]}{item.region === 'in' ? ' · India' : ''}</div>
            <h3 className="display-soft leading-tight mt-0.5" style={{ fontSize: 21, fontWeight: 500 }}>{item.title}</h3>
            {item.creator && <div className="mono mt-0.5" style={{ fontSize: 12, color: 'var(--muted)' }}>{item.creator}</div>}
          </div>
          {item.summary && <p className="mt-3" style={{ fontSize: 13.5, lineHeight: 1.55, color: 'var(--ink-soft)' }}>{item.summary}</p>}
        </a>
      );
    }

    // Standard YT video card with click-to-play
    function VideoCard({ item }) {
      return (
        <article className="card p-4 sm:p-5 fade-in flex flex-col" style={{ minHeight: 0 }}>
          <YTLite item={item} />
          <div className="mt-3">
            <div className="ttag">{TYPE_LABEL[item.type]}{item.duration ? ' · ' + item.duration : ''}</div>
            <h3 className="display-soft leading-tight mt-0.5" style={{ fontSize: 21, fontWeight: 500 }}>{item.title}</h3>
            {item.creator && (
              <div className="flex items-center gap-2 mt-1.5">
                <MiniAvatar item={item} size={22} />
                <span className="mono" style={{ fontSize: 12, color: 'var(--muted)' }}>{item.creator}</span>
              </div>
            )}
          </div>
          {item.summary && <p className="mt-3" style={{ fontSize: 13.5, lineHeight: 1.55, color: 'var(--ink-soft)' }}>{item.summary}</p>}
        </article>
      );
    }

    // Hero version — bigger, more breathing room
    function HeroCard({ item }) {
      if (item.type === 'video' && item.embedId) {
        return (
          <article className="card hero p-5 sm:p-7 fade-in">
            <div className="grid sm:grid-cols-5 gap-5 sm:gap-7 items-center">
              <div className="sm:col-span-3">
                <YTLite item={item} big />
              </div>
              <div className="sm:col-span-2">
                <div className="ttag accent">If you only do one thing</div>
                <h3 className="display-serif leading-[1.05] mt-2" style={{ fontSize: 'clamp(28px, 3.4vw, 38px)', fontWeight: 500 }}>{item.title}</h3>
                {item.creator && (
                  <div className="flex items-center gap-2 mt-2">
                    <MiniAvatar item={item} size={26} />
                    <span className="mono" style={{ fontSize: 12, color: 'var(--muted)' }}>{item.creator}{item.duration ? ' · ' + item.duration : ''}</span>
                  </div>
                )}
                {item.summary && <p className="mt-3" style={{ fontSize: 14.5, lineHeight: 1.55, color: 'var(--ink-soft)' }}>{item.summary}</p>}
              </div>
            </div>
          </article>
        );
      }
      // Tool/channel hero
      const fav = faviconFor(item.url);
      const grad = gradientFor(item.id);
      return (
        <a href={item.url} target="_blank" rel="noopener noreferrer" className="card hero p-5 sm:p-7 fade-in block">
          <div className="grid sm:grid-cols-5 gap-5 sm:gap-7 items-center">
            <div className="sm:col-span-2">
              <div className="av" style={{ background: grad, aspectRatio: '4/3' }}>
                {item.type === 'tool' ? (
                  <img src={fav} alt="" style={{ width: 80, height: 80, borderRadius: 18, background: 'rgba(255,255,255,0.94)', padding: 14, filter: 'drop-shadow(0 8px 24px rgba(0,0,0,0.18))' }} onError={(e) => { e.target.style.display = 'none'; }} />
                ) : (
                  <span className="glyph" style={{ fontSize: 'clamp(36px, 6vw, 72px)' }}>{initialsFor(item.title)}</span>
                )}
                <span className="ptag">{PLATFORM_LABEL[item.platform] || ''}</span>
              </div>
            </div>
            <div className="sm:col-span-3">
              <div className="ttag accent">If you only do one thing</div>
              <h3 className="display-serif leading-[1.05] mt-2" style={{ fontSize: 'clamp(28px, 3.4vw, 40px)', fontWeight: 500 }}>{item.title}</h3>
              {item.creator && <div className="mono mt-2" style={{ fontSize: 12, color: 'var(--muted)' }}>{item.creator}</div>}
              {item.summary && <p className="mt-3" style={{ fontSize: 14.5, lineHeight: 1.55, color: 'var(--ink-soft)' }}>{item.summary}</p>}
              <div className="mt-4 mono" style={{ fontSize: 11, color: 'var(--accent)', letterSpacing: '0.12em', textTransform: 'uppercase' }}>Open {domainOf(item.url)} ↗</div>
            </div>
          </div>
        </a>
      );
    }

    // Card dispatcher
    function Card({ item, hero }) {
      if (hero) return <HeroCard item={item} />;
      if (item.type === 'short') return <YTShortCard item={item} />;
      if (item.type === 'reel')  return <IGReelCard item={item} />;
      if (item.type === 'video' && item.embedId) return <VideoCard item={item} />;
      if (item.type === 'channel') return <ChannelCard item={item} />;
      // tool / article / newsletter / community / course / tip
      return <CompactCard item={item} />;
    }

    // ─── Section component ──────────────────────────────────────────────────
    function Section({ section, items }) {
      if (!items || items.length === 0) return null;
      // Pick a hero: first 'video' if exists, else first item
      const heroIndex = items.findIndex(it => it.type === 'video' && it.embedId);
      const heroIdx = heroIndex >= 0 ? heroIndex : -1;
      const hero = heroIdx >= 0 ? items[heroIdx] : null;
      const rest = heroIdx >= 0 ? items.filter((_, i) => i !== heroIdx) : items;

      // For 'reels' section, render in a horizontal scroll (vertical cards)
      const isReels = section.id === 'reels';
      const isStart = section.id === 'start';

      return (
        <section id={section.id} className="px-4 sm:px-8 lg:px-12 py-12 sm:py-16" style={{ scrollMarginTop: '76px' }}>
          <div className="max-w-6xl mx-auto">
            <div className="mb-7 sm:mb-9 max-w-3xl">
              <div className="label-mono mb-3" style={{ color: 'var(--accent)' }}>§ {SECTIONS.findIndex(s => s.id === section.id) + 1}</div>
              <h2 className="display-serif leading-[1.05]" style={{ fontSize: 'clamp(30px, 4.4vw, 52px)', fontWeight: 500 }}>
                {section.title}
              </h2>
              <p className="display-italic mt-3" style={{ fontSize: 'clamp(15px, 1.7vw, 19px)', lineHeight: 1.5, color: 'var(--muted)' }}>
                {section.intro}
              </p>
            </div>

            {isStart ? (
              // Horizontal numbered scroll
              <div className="scroll-x -mx-4 sm:-mx-8 lg:-mx-12 px-4 sm:px-8 lg:px-12">
                <div className="flex gap-3 sm:gap-4 pb-3" style={{ minWidth: 'min-content' }}>
                  {items.map((item, i) => (
                    <a
                      key={item.id}
                      href={item.url}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="card flat p-4 sm:p-5 flex-shrink-0 fade-in"
                      style={{ width: '300px' }}
                    >
                      <div className="flex items-center gap-3 mb-3">
                        <div style={{
                          width: 34, height: 34, borderRadius: 9,
                          background: 'var(--ink)', color: 'var(--paper)',
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          fontFamily: "'Fraunces', serif", fontSize: 17, fontWeight: 500,
                        }}>{i + 1}</div>
                        <div className="ttag">{TYPE_LABEL[item.type]}{item.duration ? ' · ' + item.duration : ''}</div>
                      </div>
                      <div className="display-soft leading-[1.15]" style={{ fontSize: 19, fontWeight: 500 }}>{item.title}</div>
                      {item.creator && (
                        <div className="flex items-center gap-2 mt-1">
                          <MiniAvatar item={item} size={20} />
                          <span className="mono" style={{ fontSize: 11, color: 'var(--muted)' }}>{item.creator}</span>
                        </div>
                      )}
                      {item.summary && <p className="mt-2" style={{ fontSize: 12.5, lineHeight: 1.5, color: 'var(--ink-soft)' }}>{item.summary}</p>}
                    </a>
                  ))}
                </div>
              </div>
            ) : isReels ? (
              <div className="scroll-x -mx-4 sm:-mx-8 lg:-mx-12 px-4 sm:px-8 lg:px-12">
                <div className="flex gap-3 sm:gap-4 pb-3" style={{ minWidth: 'min-content' }}>
                  {items.map(item => (
                    <div key={item.id} style={{ width: '260px', flexShrink: 0 }}>
                      <Card item={item} />
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <>
                {hero && (
                  <div className="mb-5">
                    <Card item={hero} hero />
                  </div>
                )}
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5">
                  {rest.map(item => (
                    <Card key={item.id} item={item} />
                  ))}
                </div>
              </>
            )}
          </div>
        </section>
      );
    }

    // ─── Filter Drawer ──────────────────────────────────────────────────────
    function FilterDrawer({ open, onClose, topic, setTopic, type, setType, region, setRegion, onClear }) {
      useEffect(() => {
        if (!open) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        document.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
      }, [open, onClose]);
      if (!open) return null;
      return (
        <>
          <div className="drawer-backdrop fade-in" onClick={onClose} />
          <aside className="drawer">
            <div className="px-6 py-6 flex items-center justify-between" style={{ borderBottom: '1px solid var(--line)' }}>
              <div>
                <div className="label-mono">Filters</div>
                <div className="display-soft mt-1" style={{ fontSize: 22, fontWeight: 500 }}>Narrow it down</div>
              </div>
              <button onClick={onClose} className="mono" style={{
                fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase',
                padding: '6px 12px', border: '1px solid var(--line)', borderRadius: 999, color: 'var(--muted)'
              }}>Close ×</button>
            </div>
            <div className="px-6 py-6">
              <div className="label-mono mb-3">Region</div>
              <div className="flex flex-wrap gap-2 mb-7">
                {REGIONS.map(r => (
                  <button key={r.id} onClick={() => setRegion(r.id)} className={`chip accent ${region === r.id ? 'active' : ''}`}>{r.label}</button>
                ))}
              </div>
              <div className="label-mono mb-3">Topic</div>
              <div className="flex flex-wrap gap-2 mb-7">
                {TOPICS.map(t => (
                  <button key={t.id} onClick={() => setTopic(t.id)} className={`chip ${topic === t.id ? 'active' : ''}`}>{t.label}</button>
                ))}
              </div>
              <div className="label-mono mb-3">Format</div>
              <div className="flex flex-wrap gap-2 mb-7">
                {TYPES.map(t => (
                  <button key={t.id} onClick={() => setType(t.id)} className={`chip ${type === t.id ? 'active' : ''}`}>{t.label}</button>
                ))}
              </div>
              <div className="rule-soft pt-5 mt-5 flex items-center justify-between">
                <button onClick={onClear} className="mono" style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--muted)' }}>Clear all</button>
                <button onClick={onClose} style={{
                  background: 'var(--ink)', color: 'var(--paper)',
                  padding: '10px 18px', borderRadius: 999,
                  fontFamily: "'JetBrains Mono', monospace",
                  fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase'
                }}>Done</button>
              </div>
            </div>
          </aside>
        </>
      );
    }

    // ─── Section Navigation Drawer ──────────────────────────────────────────
    function SectionNav({ open, onClose, sectionData, onJump }) {
      useEffect(() => {
        if (!open) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        document.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
      }, [open, onClose]);
      if (!open) return null;
      const total = SECTIONS.reduce((acc, s) => acc + (sectionData[s.id] || []).length, 0);
      return (
        <>
          <div className="drawer-backdrop fade-in" onClick={onClose} />
          <aside className="drawer drawer-left">
            <div className="px-6 py-6 flex items-center justify-between" style={{ borderBottom: '1px solid var(--line)' }}>
              <div>
                <div className="label-mono">Sections</div>
                <div className="display-soft mt-1" style={{ fontSize: 22, fontWeight: 500 }}>Jump to</div>
              </div>
              <button onClick={onClose} className="mono" style={{
                fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase',
                padding: '6px 12px', border: '1px solid var(--line)', borderRadius: 999, color: 'var(--muted)'
              }}>Close ×</button>
            </div>
            <nav className="px-3 py-4">
              {SECTIONS.map((s, i) => {
                const count = (sectionData[s.id] || []).length;
                return (
                  <button key={s.id} onClick={() => onJump(s.id)} className="nav-row">
                    <span className="flex items-baseline gap-3 min-w-0">
                      <span className="mono" style={{ fontSize: 11, color: 'var(--muted)', letterSpacing: '0.04em', flexShrink: 0 }}>
                        §{String(i + 1).padStart(2, '0')}
                      </span>
                      <span className="display-soft" style={{ fontSize: 17, fontWeight: 500, lineHeight: 1.2 }}>
                        {s.title}
                      </span>
                    </span>
                    <span className="mono" style={{ fontSize: 11, color: 'var(--muted-soft)', flexShrink: 0 }}>{count}</span>
                  </button>
                );
              })}
            </nav>
            <div className="px-6 py-4 mt-2" style={{ borderTop: '1px solid var(--line)' }}>
              <div className="label-mono">{total} resources across {SECTIONS.length} sections</div>
            </div>
          </aside>
        </>
      );
    }

    // ─── Main App ───────────────────────────────────────────────────────────
    function App() {
      const [search, setSearch] = useState('');
      const [topic, setTopic] = useState('all');
      const [type, setType] = useState('all');
      const [region, setRegion] = useState('all');
      const [drawer, setDrawer] = useState(false);
      const [nav, setNav] = useState(false);

      useEffect(() => {
        const boot = document.getElementById('boot');
        if (boot) { boot.classList.add('hidden'); setTimeout(() => boot.remove(), 350); }
      }, []);

      const filtersActive = (topic !== 'all') || (type !== 'all') || (region !== 'all') || !!search.trim();

      const filtered = useMemo(() => {
        if (!filtersActive) return DATA;
        const q = search.trim().toLowerCase();
        return DATA.filter(item => {
          if (topic !== 'all' && !(item.topics || []).includes(topic) && item.section !== topic) return false;
          if (type !== 'all' && item.type !== type) return false;
          if (region !== 'all' && item.region !== region) return false;
          if (!q) return true;
          const hay = [
            item.title, item.creator, item.summary,
            ...(item.topics || []),
            item.type, item.platform
          ].join(' ').toLowerCase();
          return hay.includes(q);
        });
      }, [filtersActive, search, topic, type, region]);

      const sectionData = useMemo(() => {
        const map = {};
        for (const s of SECTIONS) map[s.id] = [];
        for (const item of DATA) {
          if (map[item.section]) map[item.section].push(item);
        }
        // order start strip by startOrder
        if (map.start) map.start.sort((a, b) => (a.startOrder || 99) - (b.startOrder || 99));
        return map;
      }, []);

      function clearFilters() { setSearch(''); setTopic('all'); setType('all'); setRegion('all'); }

      function jumpToSection(id) {
        const wasFiltered = filtersActive;
        if (wasFiltered) clearFilters();
        setNav(false);
        // Defer scroll until after the magazine view re-renders
        setTimeout(() => {
          const el = document.getElementById(id);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, wasFiltered ? 80 : 0);
      }

      return (
        <div className="min-h-screen" style={{ background: 'var(--paper)' }}>
          {/* ─── Header / Hero ─── */}
          <header className="px-4 sm:px-8 lg:px-12 pt-8 sm:pt-14 pb-6">
            <div className="max-w-6xl mx-auto">
              <div className="flex items-center justify-between gap-3 mb-10 sm:mb-14">
                <div className="label-mono">NIFT × Info Edge</div>
                <a href="/" className="label-mono" style={{ color: 'var(--accent)' }}>← workshop deck</a>
              </div>

              <h1 className="display-serif display-hero leading-[0.96]" style={{
                fontSize: 'clamp(46px, 9vw, 110px)', fontWeight: 500, letterSpacing: '-0.02em',
              }}>
                The AI <span className="accent-underline">field guide</span><br />
                for design students.
              </h1>

              <p className="display-italic mt-6 max-w-2xl" style={{
                fontSize: 'clamp(17px, 1.9vw, 22px)', lineHeight: 1.45, color: 'var(--muted)',
              }}>
                A hand-picked, India-first list of creators, channels, tools, and quick wins.<br/>
                Made for the workshop. Meant to outlive it.
              </p>
              <div className="mt-6 mono" style={{ fontSize: 12, color: 'var(--muted-soft)', letterSpacing: '0.04em' }}>
                {DATA.length} entries · curated April 2026 · not comprehensive on purpose
              </div>
            </div>
          </header>

          {/* ─── Sticky thin filter bar ─── */}
          <div className="filter-bar sticky top-0 z-40">
            <div className="max-w-6xl mx-auto px-4 sm:px-8 lg:px-12 py-3">
              <div className="flex items-center gap-3">
                <button onClick={() => setNav(true)} className="ham-btn" aria-label="Open section menu">
                  <span className="bars" aria-hidden="true">
                    <span></span><span></span><span></span>
                  </span>
                </button>
                <div className="flex-1 relative">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                       strokeWidth="2" style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', color: 'var(--muted)' }}>
                    <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                  </svg>
                  <input
                    value={search}
                    onChange={(e) => setSearch(e.target.value)}
                    placeholder="Search creators, tools, topics…"
                    className="w-full"
                    style={{
                      padding: '10px 14px 10px 38px',
                      border: '1px solid var(--line)', borderRadius: 999,
                      background: '#FBFAF4', fontSize: 14, outline: 'none',
                    }}
                    onFocus={(e) => e.target.style.borderColor = 'var(--ink-soft)'}
                    onBlur={(e) => e.target.style.borderColor = 'var(--line)'}
                  />
                </div>
                <button onClick={() => setDrawer(true)} className={`chip ${filtersActive ? 'active' : ''}`} style={{ padding: '8px 16px' }}>
                  Filter ▾{filtersActive ? ` · ${filtered.length}` : ''}
                </button>
              </div>
            </div>
          </div>

          {/* ─── Body ─── */}
          {filtersActive ? (
            // Flat grid view
            <main className="px-4 sm:px-8 lg:px-12 pt-10 pb-24">
              <div className="max-w-6xl mx-auto">
                <div className="mb-6 flex items-baseline justify-between">
                  <div>
                    <div className="label-mono mb-2">Filtered</div>
                    <div className="display-serif" style={{ fontSize: 'clamp(26px, 3.4vw, 36px)', fontWeight: 500 }}>
                      {filtered.length} of {DATA.length} resources
                    </div>
                  </div>
                  <button onClick={clearFilters} className="mono" style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--accent)' }}>
                    Clear ×
                  </button>
                </div>
                {filtered.length === 0 ? (
                  <div className="text-center py-20">
                    <div className="display-serif" style={{ fontSize: 32, color: 'var(--muted)' }}>Nothing matches that.</div>
                    <p className="mt-3 mono" style={{ color: 'var(--muted)' }}>Try a broader search.</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5">
                    {filtered.map(item => <Card key={item.id} item={item} />)}
                  </div>
                )}
              </div>
            </main>
          ) : (
            // Magazine view
            <>
              {SECTIONS.map(section => (
                <Section key={section.id} section={section} items={sectionData[section.id]} />
              ))}
            </>
          )}

          {/* ─── Footer ─── */}
          <footer className="px-4 sm:px-8 lg:px-12 py-16" style={{ borderTop: '1px solid var(--line)' }}>
            <div className="max-w-6xl mx-auto">
              <div className="display-serif" style={{ fontSize: 'clamp(28px, 4.4vw, 52px)', fontWeight: 500, lineHeight: 1.05 }}>
                AI makes the hands faster.<br />
                <span style={{ color: 'var(--accent)' }}>It does not make the eyes better.</span>
              </div>
              <p className="display-italic mt-4 max-w-xl" style={{ fontSize: 'clamp(15px, 1.7vw, 19px)', color: 'var(--muted)', lineHeight: 1.5 }}>
                Your eyes are what NIFT is teaching you. This list is for the hands.
              </p>
              <div className="mt-10 rule-soft pt-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                <div className="label-mono">NIFT × Info Edge · v2 · April 2026</div>
                <div className="label-mono">Spotted something missing? Tell the team.</div>
              </div>
            </div>
          </footer>

          <FilterDrawer
            open={drawer}
            onClose={() => setDrawer(false)}
            topic={topic} setTopic={setTopic}
            type={type} setType={setType}
            region={region} setRegion={setRegion}
            onClear={() => { clearFilters(); }}
          />

          <SectionNav
            open={nav}
            onClose={() => setNav(false)}
            sectionData={sectionData}
            onJump={jumpToSection}
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
